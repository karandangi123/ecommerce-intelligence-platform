# E-Commerce Intelligence Platform Pipeline Configurations

paths:
  source_archive_dir: "/Users/karandangi/Downloads/final project/archive"
  raw_dir: "data/raw"
  bronze_dir: "data/bronze"
  silver_dir: "data/silver"
  gold_dir: "data/gold"
  gold_db_path: "data/gold/ecommerce_analytics.db"

ml:
  random_seed: 42
  test_size: 0.2
  forecast_horizon_days: 30
